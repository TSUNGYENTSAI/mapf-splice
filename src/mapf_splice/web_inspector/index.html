<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MAPF Splice — Recovery Stories</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="capture.css">
    <link rel="stylesheet" href="story-visuals.css">
  </head>
  <body>
    <main class="story-shell">
      <header class="story-header">
        <div class="story-heading">
          <div class="story-meta"><span id="storyLabel">Story B</span><span id="caseLabel">—</span></div>
          <h1 id="storyTitle">Local Recovery, Not Global Replanning</h1>
          <p id="storyClaim">Only the affected robots enter recovery; normal work continues outside the scope.</p>
        </div>
        <div class="story-controls control">
          <label>Story<select id="storySelect" aria-label="Story"></select></label>
          <button id="previousStage" aria-label="Previous story frame">‹</button>
          <button id="play" class="primary" aria-label="Play, pause, resume, or restart story playback">Play</button>
          <button id="nextStage" aria-label="Next story frame">›</button>
          <div class="tick"><strong id="tickLabel">T0</strong><span id="checkpointLabel">—</span></div>
          <button id="openEvidence">Evidence</button>
          <button id="toggleExport">Export view</button>
        </div>
      </header>

      <section class="story-stage">
        <article class="physical-card">
          <div class="view-heading"><div><span>Physical view</span><h2>Authoritative fleet state</h2></div><div id="mapLegend" class="map-legend"></div></div>
          <div id="physicalMap" class="physical-map" aria-label="Robot map"></div>
          <p id="physicalConclusion" class="physical-conclusion"></p>
        </article>

        <aside class="logical-rail">
          <section class="logical-view">
            <div class="view-heading"><div><span>Logical view</span><h2 id="logicalTitle">Affected scope</h2></div><span id="logicalState" class="state-chip"></span></div>
            <div id="logicalVisual" class="logical-visual"></div>
          </section>
          <section class="explanation">
            <span>Current explanation</span>
            <p id="explanationText"></p>
            <div id="minimalEvidence" class="minimal-evidence"></div>
          </section>
        </aside>
      </section>

      <footer class="lifecycle">
        <div class="lifecycle-heading"><span>Lifecycle view</span><strong id="stageName">—</strong></div>
        <div id="stages" class="stages"></div>
        <input id="storySlider" class="control" type="range" min="0" value="0" aria-label="Story playback position">
      </footer>
    </main>

    <div id="drawerBackdrop" class="drawer-backdrop" hidden></div>
    <aside id="evidenceDrawer" class="evidence-drawer" aria-label="Evidence" aria-hidden="true">
      <header><div><span>Replay evidence</span><h2>Evidence</h2></div><button id="closeEvidence">Close</button></header>
      <nav id="evidenceTabs" aria-label="Evidence sections"></nav>
      <div id="evidenceContent" class="evidence-content"></div>
    </aside>
    <script type="module" src="app.js"></script>
  </body>
</html>
